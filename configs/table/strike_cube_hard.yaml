# configuration for objects and agents, add scene as well
task_name: StrikeCubeHard
scene:
  name: Table
  primitives:
    - name: cube
      builder: mani_skill.utils.building.actors.build_cube
      params:
        half_size: 0.02
        color: [0.7333333333, 0.4549019608, 0.6862745098, 1.]
        name: cube
        initial_pose:
          p: [0.6, 0.55, 0.02]
      pos:
        ppos:
          p: [0.6, 0.55, 0.02]
        qpos: [0.751475, -5.48322e-06, -4.62414e-06, 0.659761]
        randp_scale: [0.13, 0.1, 0.]
        randq_scale: [0., 0., 0., 0.]
        random_quaternions: [1, 1, 0]

    - name: goal_region
      builder: mani_skill.utils.building.actors.build_red_white_target
      params:
        radius: 0.12
        thickness: 0.00005  # 1e-5
        name: goal_region
        add_collision: False
        body_type: kinematic
        initial_pose:
          p: [0.303446, 0, 0.001]
      pos:
        ppos:
          p: [0.303446, 0, 0.001]
          q: [0., 1.5707963268, 0.]
        qpos: [0., 0.70710678, 0., 0.70710678]
        randp_scale: [0.05, 0.05, 0.]
        randq_scale: [0., 0., 0., 0.]
        
  assets: 
    - name: table
      file_path: assets/scenes/table/table.glb
      collision:
        type: box
        pos:
          p: [0, 0, 0.45982145]
          half_size: [3.0225, 1.51125, 0.45982145]
      pos: 
        ppos:
          p: [-0.12, 0., -0.9196429]
          q: [0., 0., 1.5707963268]
        randp_scale: [0., 0., 0.]
        randq_scale: [0., 0., 0., 0.]
      scale: [4.375, 4.375, 1.75]
  env:
    floor_width: 100
    
objects:
  - name: hammer
    file_path: assets/objects/hammer_annotated/base.glb
    annotation_path: assets/objects/hammer_annotated/model_data.json
    material: 
      type: sapien.pysapien.physx.PhysxMaterial
      params:
        static_friction: 0.3
        dynamic_friction: 0.3
        restitution: 0.
    visual:
      filename: assets/objects/hammer_annotated/base.glb
      scale: [0.079, 0.079, 0.079]
    collision:
      type: convex
      filename: assets/objects/hammer_annotated/base.glb
      scale: [0.079, 0.079, 0.079]
    pos:
      ppos:
        p: [0., -0.02, 0.042]
      qpos: [0.093, 0.873, 0.476, 0.051]
      randp_scale: [0.1, 0.05, 0.]
      randq_scale: [0., 0., 0., 0.]
    mass_params:
      mass: 0.05
      cmass_local_pose: [0., 0., 0.]
      inertia: [0.1, 0.1, 0.1]

agents:
  - robot_uid: panda-0
    pos:
      ppos:
        p: [0., -0.65, 0.]
        q: [0., 0., 1.5707963268]
      qpos: [0., 0.3926990817, 0., -1.9634954085, 0., 2.3561944902, 0.7853981634, 0.04, 0.04]
      randp_scale: [0., 0., 0.]
      randq_scale: [0., 0., 0., 0., 0., 0., 0., 0., 0.]
  - robot_uid: panda-1
    pos:
      ppos:
        p: [0., 0.65, 0.]
        q: [0., 0., -1.5707963268]
      qpos: [0., 0.3926990817, 0., -1.9634954085, 0., 2.3561944902, 0.7853981634, 0.04, 0.04]
      randp_scale: [0., 0., 0.]
      randq_scale: [0., 0., 0., 0., 0., 0., 0., 0., 0.]

cameras:
  sensor:
    - 
      uid: head_camera_agent0
      pose:
        type: pose
        params: [[0.585897, -0.378122, 0.475626], [0.218651, -0.173882, 0.0396313, 0.959368]]
      width: 320
      height: 240
      fov: 1.5707963268
      near: 0.01
      far: 10

    - 
      uid: head_camera_agent1
      pose:
        type: pose
        params: [[0.828371, 0.138805, 0.559155], [0.264788, -0.32837, 0.0964454, 0.901531]]
      width: 320
      height: 240
      fov: 1.5707963268
      near: 0.01
      far: 10
    - 
      uid: head_camera_global
      pose:
        type: pose
        params: [[0.628828, -0.265633, 0.873436], [0.258007, -0.407659, 0.121245, 0.867494]]
      width: 320
      height: 240
      fov: 1.5707963268
      near: 0.01
      far: 10

  human_render:
    - 
      uid: render_camera
      pose:
        type: look_at
        params: [[1.4, 0.8, 0.75], [0.0, 0.1, 0.1]]
      width: 512
      height: 512
      fov: 1.2
      near: 0.01
      far: 100
